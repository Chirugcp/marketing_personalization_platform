version: '3.9'
services:
  mongo:
    image: mongo:7
    ports:
      - '27017:27017'

  redis:
    image: redis:7
    ports:
      - '6379:6379'

  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: neo4j/password
    ports:
      - '7474:7474'
      - '7687:7687'

  api:
    build: .
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000
    ports:
      - '8000:8000'
    depends_on:
      - mongo
      - redis
      - neo4j
